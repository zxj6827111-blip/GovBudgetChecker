services:
  ai-extractor:
    build:
      context: .
      dockerfile: Dockerfile.ai-extractor
    ports:
      - "9009:9009"
    environment:
      # Multi-provider settings (optional for extractor)
      - ARK_API_KEY=${ARK_API_KEY:-your_ark_api_key}
      - ARK_BASE_URL=${ARK_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
      - ARK_MODEL=${ARK_MODEL:-doubao-1-5-pro-32k-250115}
      # OpenAI-compatible settings can also be injected if needed
      # - OPENAI_API_KEY=${OPENAI_API_KEY:-your_openai_api_key}
      # - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      # - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9009/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - AI_ASSIST_ENABLED=true
      - AI_EXTRACTOR_URL=http://ai-extractor:9009/ai/extract/v1
      - UPLOAD_DIR=/app/uploads
      - RULES_FILE_PATH=/app/engine/rules_v33.py
      - GOVBUDGET_AUTH_ENABLED=${GOVBUDGET_AUTH_ENABLED:-true}
      - GOVBUDGET_API_KEY=${GOVBUDGET_API_KEY:-}
      # AI provider pass-through
      - ARK_API_KEY=${ARK_API_KEY:-}
      - ARK_BASE_URL=${ARK_BASE_URL:-}
      - ARK_MODEL=${ARK_MODEL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_BASE_URL=${GEMINI_BASE_URL:-}
      - GEMINI_MAIN_MODEL=${GEMINI_MAIN_MODEL:-gemini-2.5-pro}
      - GEMINI_LOCATOR_MODEL=${GEMINI_LOCATOR_MODEL:-gemini-2.5-flash}
      - CODEX_API_KEY=${CODEX_API_KEY:-}
      - CODEX_BASE_URL=${CODEX_BASE_URL:-}
      - CODEX_MODEL=${CODEX_MODEL:-gpt-5.3-codex}
      - AI_MAIN_PROVIDER=${AI_MAIN_PROVIDER:-gemini_main}
      - AI_MAIN_MODEL=${AI_MAIN_MODEL:-gemini-2.5-pro}
      - AI_LOCATOR_PROVIDER=${AI_LOCATOR_PROVIDER:-gemini_locator}
      - AI_LOCATOR_MODEL=${AI_LOCATOR_MODEL:-gemini-2.5-flash}
      - AI_EXTRACTOR_DIRECT_FALLBACK=${AI_EXTRACTOR_DIRECT_FALLBACK:-true}
    depends_on:
      - ai-extractor
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./samples:/app/samples
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - GOVBUDGET_API_KEY=${GOVBUDGET_API_KEY:-}
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    driver: bridge

volumes:
  data:
  logs:
