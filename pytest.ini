# pytest configuration
[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage settings
[coverage:run]
source = src
omit = 
    */tests/*
    */migrations.py
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False